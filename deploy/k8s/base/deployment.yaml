apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepseek-v4-paper
  labels:
    app.kubernetes.io/name: deepseek-v4-paper
    app.kubernetes.io/part-of: deepseek-v4-paper
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deepseek-v4-paper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deepseek-v4-paper
        app.kubernetes.io/part-of: deepseek-v4-paper
    spec:
      containers:
        - name: deepseek-v4-paper
          image: registry.144.91.77.245.sslip.io/deepseek-v4-paper:bootstrap
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
          ports:
            - name: http
              containerPort: 3000
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi

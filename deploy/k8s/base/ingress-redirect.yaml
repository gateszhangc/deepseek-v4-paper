apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deepseek-v4-paper-live-redirect
  labels:
    app.kubernetes.io/name: deepseek-v4-paper
    app.kubernetes.io/part-of: deepseek-v4-paper
  annotations:
    nginx.ingress.kubernetes.io/permanent-redirect: https://deepseekv4paper.lol
    nginx.ingress.kubernetes.io/permanent-redirect-code: "308"
spec:
  ingressClassName: nginx
  rules:
    - host: www.deepseekv4paper.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deepseek-v4-paper
                port:
                  number: 80
  tls:
    - hosts:
        - www.deepseekv4paper.lol
      secretName: deepseek-v4-paper-live-tls

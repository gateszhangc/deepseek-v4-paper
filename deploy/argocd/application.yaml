apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: deepseek-v4-paper
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: deepseek-v4-paper
  source:
    repoURL: https://github.com/gateszhangc/deepseek-v4-paper.git
    targetRevision: main
    path: deploy/k8s/overlays/prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

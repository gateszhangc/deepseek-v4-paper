name: Build And Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deepseek-v4-paper-release
  cancel-in-progress: true

env:
  APP_NAME: deepseek-v4-paper
  BUILD_NAMESPACE: build-jobs
  IMAGE_REPOSITORY: registry.144.91.77.245.sslip.io/deepseek-v4-paper
  KUSTOMIZATION_FILE: deploy/k8s/overlays/prod/kustomization.yaml
  ARGO_APP_NAME: deepseek-v4-paper
  ARGO_NAMESPACE: argocd
  JOB_PREFIX: deepseek-v4-paper-build
  REGISTRY_SECRET_NAME: registry-push

jobs:
  build-and-release:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"

      - name: Derive build metadata
        id: meta
        run: |
          short_sha="${GITHUB_SHA::12}"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "job_name=${JOB_PREFIX}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Submit Kubernetes build job
        env:
          APP_REPO: ${{ github.repository }}
          GIT_SHA: ${{ github.sha }}
          IMAGE_TAG: ${{ github.sha }}
          JOB_NAME: ${{ steps.meta.outputs.job_name }}
        run: |
          kubectl -n "$BUILD_NAMESPACE" delete job "$JOB_NAME" --ignore-not-found
          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${JOB_NAME}
            namespace: ${BUILD_NAMESPACE}
            labels:
              app.kubernetes.io/name: ${APP_NAME}
              app.kubernetes.io/component: image-build
              app.kubernetes.io/part-of: ${APP_NAME}
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 86400
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: ${APP_NAME}
                  app.kubernetes.io/component: image-build
                  app.kubernetes.io/part-of: ${APP_NAME}
              spec:
                restartPolicy: Never
                initContainers:
                  - name: clone-source
                    image: alpine/git:2.47.2
                    command:
                      - /bin/sh
                      - -ec
                      - |
                        git clone --depth 1 "https://github.com/${APP_REPO}.git" /workspace/source
                        cd /workspace/source
                        git fetch --depth 1 origin "${GIT_SHA}"
                        git checkout "${GIT_SHA}"
                    env:
                      - name: APP_REPO
                        value: "${APP_REPO}"
                      - name: GIT_SHA
                        value: "${GIT_SHA}"
                    volumeMounts:
                      - mountPath: /workspace/source
                        name: source
                containers:
                  - name: kaniko
                    image: gcr.io/kaniko-project/executor:v1.23.2-debug
                    command:
                      - /busybox/sh
                      - -ec
                      - |
                        /kaniko/executor \
                          --context=dir:///workspace/source \
                          --dockerfile=/workspace/source/Dockerfile \
                          --destination="${IMAGE_REPOSITORY}:${IMAGE_TAG}" \
                          --snapshot-mode=redo \
                          --use-new-run
                    env:
                      - name: IMAGE_REPOSITORY
                        value: "${IMAGE_REPOSITORY}"
                      - name: IMAGE_TAG
                        value: "${IMAGE_TAG}"
                    volumeMounts:
                      - mountPath: /workspace/source
                        name: source
                      - mountPath: /kaniko/.docker
                        name: docker-config
                volumes:
                  - name: source
                    emptyDir: {}
                  - name: docker-config
                    secret:
                      secretName: ${REGISTRY_SECRET_NAME}
          EOF

      - name: Wait for build job completion
        env:
          JOB_NAME: ${{ steps.meta.outputs.job_name }}
        run: |
          if ! kubectl -n "$BUILD_NAMESPACE" wait --for=condition=complete --timeout=20m "job/${JOB_NAME}"; then
            kubectl -n "$BUILD_NAMESPACE" describe "job/${JOB_NAME}" || true
            kubectl -n "$BUILD_NAMESPACE" logs "job/${JOB_NAME}" --all-containers=true || true
            exit 1
          fi
          kubectl -n "$BUILD_NAMESPACE" logs "job/${JOB_NAME}" --all-containers=true

      - name: Update GitOps image tag
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path(os.environ["KUSTOMIZATION_FILE"])
          content = path.read_text()
          updated, count = re.subn(
              r"(^\s*newTag:\s*).*$",
              rf"\1{os.environ['IMAGE_TAG']}",
              content,
              count=1,
              flags=re.MULTILINE,
          )
          if count != 1:
              raise SystemExit("Expected exactly one newTag entry in kustomization.yaml")
          path.write_text(updated)
          PY

      - name: Commit kustomization update
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$KUSTOMIZATION_FILE"
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: release ${APP_NAME} ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:main

      - name: Wait for Argo CD sync
        run: |
          if ! kubectl -n "$ARGO_NAMESPACE" get application "$ARGO_APP_NAME" >/dev/null 2>&1; then
            echo "Argo CD application '$ARGO_APP_NAME' not found yet. Bootstrap deploy/argocd/application.yaml once."
            exit 0
          fi

          for attempt in $(seq 1 90); do
            sync_status="$(kubectl -n "$ARGO_NAMESPACE" get application "$ARGO_APP_NAME" -o jsonpath='{.status.sync.status}')"
            health_status="$(kubectl -n "$ARGO_NAMESPACE" get application "$ARGO_APP_NAME" -o jsonpath='{.status.health.status}')"
            echo "attempt=${attempt} sync=${sync_status} health=${health_status}"
            if [ "$sync_status" = "Synced" ] && [ "$health_status" = "Healthy" ]; then
              exit 0
            fi
            sleep 10
          done

          kubectl -n "$ARGO_NAMESPACE" get application "$ARGO_APP_NAME" -o yaml
          exit 1
